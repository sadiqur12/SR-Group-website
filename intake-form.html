<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Group — Project Intake Form</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cover: #16302A;
    --paper: #F6F1E2;
    --paper-line: #CBBE97;
    --ink: #1C231F;
    --ink-soft: #5B6459;
    --stamp: #A63A2E;
    --gold: #A8863C;
    --white: #FFFDF8;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Inter',sans-serif; background:#EEEAE0; color:var(--ink);
    margin:0; padding:32px 16px; line-height:1.6;
  }
  .slab{font-family:'Roboto Slab',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .sheet{
    max-width:640px; margin:0 auto; background:var(--paper);
    border:1px solid var(--paper-line); box-shadow:0 20px 50px -25px rgba(0,0,0,0.35);
    padding:40px;
  }
  .head{
    display:flex; align-items:center; gap:14px; margin-bottom:8px;
  }
  .head svg{width:44px; height:44px; flex-shrink:0;}
  .head-name{font-family:'Roboto Slab',serif; font-weight:700; font-size:20px;}
  .head-sub{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft);}
  h1{
    font-family:'Roboto Slab',serif; font-size:26px; font-weight:700;
    border-bottom:3px solid var(--cover); padding-bottom:16px; margin:24px 0 8px;
  }
  .intro{color:var(--ink-soft); font-size:14.5px; margin-bottom:28px;}

  .field{margin-bottom:22px;}
  label{
    display:block; font-family:'IBM Plex Mono',monospace; font-size:11.5px;
    color:var(--gold); letter-spacing:0.04em; margin-bottom:6px; font-weight:600;
  }
  input, select, textarea{
    width:100%; font-family:'Inter',sans-serif; font-size:14.5px; color:var(--ink);
    padding:10px 12px; border:1px solid var(--paper-line); border-radius:4px;
    background:var(--white);
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--gold);}
  textarea{resize:vertical; min-height:70px;}

  .radio-group{display:flex; gap:10px; flex-wrap:wrap;}
  .radio-option{
    border:1px solid var(--paper-line); border-radius:4px; padding:9px 14px;
    font-size:14px; cursor:pointer; background:var(--white); display:flex; align-items:center; gap:6px;
  }
  .radio-option input{width:auto; margin:0;}

  .submit-btn{
    width:100%; background:var(--stamp); color:var(--white); font-weight:700; font-size:15px;
    padding:14px; border:none; border-radius:4px; cursor:pointer; margin-top:12px;
  }
  .submit-btn:hover{opacity:0.9;}

  .note{font-size:12.5px; color:var(--ink-soft); text-align:center; margin-top:14px;}
</style>
</head>
<body>

<div class="sheet">
  <div class="head">
    <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <circle cx="120" cy="120" r="100" fill="#16302A"/>
      <circle cx="120" cy="120" r="100" fill="none" stroke="#A8863C" stroke-width="6"/>
      <circle cx="120" cy="120" r="84" fill="none" stroke="#A8863C" stroke-width="2" stroke-dasharray="4 7"/>
      <text x="120" y="145" font-family="'Roboto Slab',serif" font-size="70" font-weight="700" fill="#F6F1E2" text-anchor="middle">SR</text>
    </svg>
    <div>
      <div class="head-name">SR Group</div>
      <div class="head-sub">CUSTOM SOFTWARE &amp; AI</div>
    </div>
  </div>

  <h1>Tell us about your project</h1>
  <p class="intro">Fill this out and hit send — it opens your email with everything filled in, ready to reach SR Group directly.</p>

  <form id="intake-form">
    <div class="field">
      <label>Your name</label>
      <input type="text" id="contact-name" required>
    </div>

    <div class="field">
      <label>Business name</label>
      <input type="text" id="business-name" required>
    </div>

    <div class="field">
      <label>Phone / WhatsApp</label>
      <input type="text" id="phone" required>
    </div>

    <div class="field">
      <label>Email (optional)</label>
      <input type="email" id="email">
    </div>

    <div class="field">
      <label>What kind of business is this?</label>
      <input type="text" id="business-type" placeholder="e.g. restaurant, clothing shop, tutoring service" required>
    </div>

    <div class="field">
      <label>What problem do you want solved?</label>
      <textarea id="problem" placeholder="e.g. Customers call constantly to ask about order status — I want them to check it themselves." required></textarea>
    </div>

    <div class="field">
      <label>What do you need?</label>
      <div class="radio-group">
        <label class="radio-option"><input type="radio" name="platform" value="Web app" checked> Web app</label>
        <label class="radio-option"><input type="radio" name="platform" value="Mobile app"> Mobile app</label>
        <label class="radio-option"><input type="radio" name="platform" value="Both web and mobile"> Both</label>
        <label class="radio-option"><input type="radio" name="platform" value="Not sure yet"> Not sure yet</label>
      </div>
    </div>

    <div class="field">
      <label>Rough budget (৳)</label>
      <select id="budget">
        <option>Under 10,000</option>
        <option>10,000 – 25,000</option>
        <option>25,000 – 50,000</option>
        <option>50,000+</option>
        <option>Not sure yet</option>
      </select>
    </div>

    <div class="field">
      <label>When do you need this by?</label>
      <input type="text" id="timeline" placeholder="e.g. within a month, no rush, ASAP">
    </div>

    <div class="field">
      <label>Anything else? (reference apps, specific features, etc.)</label>
      <textarea id="notes"></textarea>
    </div>

    <button type="submit" class="submit-btn">Send to SR Group</button>
    <p class="note">This opens your email app with everything filled in — just hit send there.</p>
  </form>
</div>

<script>
document.getElementById('intake-form').addEventListener('submit', function(e){
  e.preventDefault();

  const name = document.getElementById('contact-name').value;
  const business = document.getElementById('business-name').value;
  const phone = document.getElementById('phone').value;
  const email = document.getElementById('email').value;
  const type = document.getElementById('business-type').value;
  const problem = document.getElementById('problem').value;
  const platform = document.querySelector('input[name="platform"]:checked').value;
  const budget = document.getElementById('budget').value;
  const timeline = document.getElementById('timeline').value;
  const notes = document.getElementById('notes').value;

  const subject = `Project inquiry — ${business}`;
  const body =
`Name: ${name}
Business: ${business}
Phone/WhatsApp: ${phone}
Email: ${email || 'N/A'}

Business type: ${type}

Problem to solve:
${problem}

Needs: ${platform}
Budget: ${budget}
Timeline: ${timeline || 'Not specified'}

Additional notes:
${notes || 'None'}`;

  const mailtoLink = `mailto:hossainalijms9@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailtoLink;
});
</script>

</body>
</html>
